<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinetic Vault | Ghost Server</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="vault-box">
        <div class="logo">KINETIC VAULT</div>
        <div class="status-panel">
            <span id="status-label">STATUS:</span>
            <span id="status-text">DISCONNECTED</span>
        </div>
        
        <div class="info-grid">
            <div class="info-item">SERVER: <span>CLOUDFLARE EDGE</span></div>
            <div class="info-item">PROTOCOL: <span>VLESS + WS</span></div>
        </div>

        <button id="connect-btn" onclick="startGhost()">INITIALIZE TUNNEL</button>
        
        <div class="footer">USER: ATAKAN | ARCH: X64</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
